apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: publish-release
  annotations:
    chains.tekton.dev/transparency-upload: "true"
spec:
  params:
    - name: package
      description: package to release (e.g. github.com/<org>/<project>)
      default: github.com/tektoncd/pipeline

    - name: images
      description: List of cmd/* paths to be published as images
      default: "controller webhook entrypoint nop workingdirinit resolvers sidecarlogresults events"

    - name: koExtraArgs
      description: Extra args to be passed to ko
      default: "--preserve-import-paths"

    - name: versionTag
      description: The version, vX.Y.Z for stable, vYYYYMMDD-abc1234 for nightly that the artifacts should be tagged with (including `v`).

    - name: imageRegistry
      description: The target image registry
      default: na.artifactory.swg-devops.com

    - name: imageRegistryPath
      description: The path (project) in the image registry
      default: sys-linux-power-team-ftp3distro-docker-images-docker-local/tekton

    - name: imageRegistryRegions
      description: The target image registry regions
      default: ""

    - name: imageRegistryUser
      description: Username to be used to login to the container registry
      default: "_json_key"

    - name: releaseAsLatest
      description: Whether to tag and publish this release as Pipelines latest
      default: "true"

    - name: platforms
      description: Platforms to publish for the images (e.g. linux/amd64,linux/arm64)
      default: linux/ppc64le,linux/amd64

    - name: serviceAccountPath
      description: The name of the service account path within the release-secret workspace

  workspaces:
    - name: source
      description: Workspace with the source repo
      mountPath: /go/src/github.com/tektoncd/pipeline

    - name: release-secret
      description: The secret containing registry credentials

    - name: output
      description: The release YAML will be written here

  stepTemplate:
    env:
      - name: "PROJECT_ROOT"
        value: "$(workspaces.source.path)"
      - name: CONTAINER_REGISTRY_CREDENTIALS
        value: "$(workspaces.release-secret.path)/$(params.serviceAccountPath)"
      - name: CONTAINER_REGISTRY
        value: "$(params.imageRegistry)/$(params.imageRegistryPath)"
      - name: CONTAINER_REGISTRY_USER
        value: "$(params.imageRegistryUser)"
      - name: REGIONS
        value: "$(params.imageRegistryRegions)"
      - name: OUTPUT_RELEASE_DIR
        value: "$(workspaces.output.path)/$(params.versionTag)"
      - name: KO_EXTRA_ARGS
        value: "$(params.koExtraArgs)"

  results:
    - name: IMAGES

  steps:

  # Step 1: Authenticate to Artifactory
  - name: container-registry-auth
    image: cgr.dev/chainguard/crane:latest-dev
    script: |
      #!/bin/sh
      set -ex
      echo "Logging into Artifactory registry $(params.imageRegistry)"
      mkdir -p ~/.docker

      cat ${CONTAINER_REGISTRY_CREDENTIALS} | crane auth login \
        -u ${CONTAINER_REGISTRY_USER} \
        --password-stdin $(params.imageRegistry)

      cp ~/.docker/config.json /workspace/docker-config.json

  # Step 2: Prepare .ko.yaml dynamically (auto-detect ppc64le fix)
  - name: create-ko-yaml
    image: cgr.dev/chainguard/go:latest-dev
    script: |
      #!/bin/sh
      set -ex

      echo "Preparing .ko.yaml for PPC64LE publishing"

      mkdir -p ~/.docker
      cp /workspace/docker-config.json ~/.docker/config.json

      cd ${PROJECT_ROOT}
      cp ${PROJECT_ROOT}/.ko.yaml /workspace/.ko.yaml

      # Replace all GHCR and cgr.dev base images with Artifactory mirrors
      sed -i 's|ghcr.io/tektoncd/pipeline|na.artifactory.swg-devops.com/sys-linux-power-team-ftp3distro-docker-images-docker-local/tekton|g' /workspace/.ko.yaml
      sed -i 's|cgr.dev/chainguard|na.artifactory.swg-devops.com/sys-linux-power-team-ftp3distro-docker-images-docker-local/tekton|g' /workspace/.ko.yaml

      echo "Final .ko.yaml content:"
      cat /workspace/.ko.yaml

  # Step 3: Build and push images with ko
  - name: run-ko
    image: ghcr.io/tektoncd/plumbing/ko@sha256:990ec7fc709567e0d26fa40788a040b97598343d2fcb7252751316e34f31c4cc
    env:
      - name: KO_DOCKER_REPO
        value: na.artifactory.swg-devops.com/sys-linux-power-team-ftp3distro-docker-images-docker-local/tekton
      - name: DOCKER_CONFIG
        value: /workspace/.docker
      - name: GOFLAGS
        value: "-mod=vendor"
    script: |
      #!/bin/sh
      set -ex

      mkdir -p ~/.docker
      cp /workspace/docker-config.json ~/.docker/config.json

      export KO_CONFIG_PATH=/workspace
      cd ${PROJECT_ROOT}

      echo "Building and publishing images for $(params.platforms)"
      git config --global --add safe.directory ${PROJECT_ROOT}
      git tag $(params.versionTag)

      mkdir -p $OUTPUT_RELEASE_DIR

      ko resolve \
        --image-label=org.opencontainers.image.source=https://$(params.package) \
        --platform=$(params.platforms) \
        -t $(params.versionTag) \
        -R ${KO_EXTRA_ARGS} \
        -f ${PROJECT_ROOT}/config/ > $OUTPUT_RELEASE_DIR/release.yaml

      ko resolve \
        --image-label=org.opencontainers.image.source=https://$(params.package) \
        --platform=$(params.platforms) \
        -R ${KO_EXTRA_ARGS} \
        -f ${PROJECT_ROOT}/config/ > $OUTPUT_RELEASE_DIR/release.notags.yaml

      echo "Image resolution complete"

  # Step 4: Parse and record images for Tekton Chains signing
  - name: koparse
    image: ghcr.io/tektoncd/plumbing/koparse@sha256:7ea59fefb312a512973f743298c17217ca96f0e9303f8d40ebbf2d27ceb9f21e
    script: |
      #!/bin/sh
      set -ex
      echo "Extracting image list for signing"
      for cmd in $(params.images); do
        IMAGES="${IMAGES} $(params.package)/cmd/${cmd}:$(params.versionTag)"
      done
      koparse \
        --path $OUTPUT_RELEASE_DIR/release.yaml \
        --base $(params.package) \
        --container-registry $(params.imageRegistry)/$(params.imageRegistryPath) \
        --images ${IMAGES} > /workspace/built_images

  # Step 5: Tag latest and regional copies
  - name: tag-images
    image: cgr.dev/chainguard/crane:latest-dev
    script: |
      #!/bin/sh
      set -ex
      mkdir -p ~/.docker
      cp /workspace/docker-config.json ~/.docker/config.json

      echo "Tagging images"
      for IMAGE in $(cat /workspace/built_images)
      do
        IMAGE_WITHOUT_SHA=${IMAGE%%@*}
        IMAGE_WITHOUT_SHA_AND_TAG=${IMAGE_WITHOUT_SHA%%:*}
        IMAGE_WITH_SHA=${IMAGE_WITHOUT_SHA_AND_TAG}@${IMAGE##*@}
        echo $IMAGE_WITH_SHA, >> $(results.IMAGES.path)

        if [[ "$(params.releaseAsLatest)" == "true" ]]; then
          crane cp ${IMAGE_WITH_SHA} ${IMAGE_WITHOUT_SHA_AND_TAG}:latest
        fi

        for REGION in ${REGIONS}; do
          if [[ "$(params.releaseAsLatest)" == "true" ]]; then
            for TAG in "latest" $(params.versionTag); do
              crane cp ${IMAGE_WITH_SHA} ${REGION}.${IMAGE_WITHOUT_SHA_AND_TAG}:$TAG
            done
          else
            TAG="$(params.versionTag)"
            crane cp ${IMAGE_WITH_SHA} ${REGION}.${IMAGE_WITHOUT_SHA_AND_TAG}:$TAG
          fi
        done
      done
      echo "Tagging complete"
